<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada — Luis José Digital</title>
<link rel="icon" type="image/png" href="https://i.postimg.cc/mDjmd9xJ/Perfil.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .notfound{
    min-height:100svh;display:flex;align-items:center;justify-content:center;
    flex-direction:column;text-align:center;padding:24px;
    background:radial-gradient(ellipse 700px 500px at 50% 20%, rgba(255,106,26,0.14), transparent 60%), var(--black);
  }
  .notfound-code{
    font-family:'JetBrains Mono',monospace;color:var(--orange);
    font-size:0.9rem;letter-spacing:0.08em;margin-bottom:18px;
  }
  .notfound h1{
    font-family:'Space Grotesk',sans-serif;font-weight:700;
    font-size:clamp(2rem,6vw,3.2rem);letter-spacing:-0.02em;margin-bottom:16px;
  }
  .notfound p{color:var(--gray);font-size:1rem;max-width:440px;margin-bottom:32px;line-height:1.6;}
</style>
</head>
<body>

<div class="notfound">
  <img class="nav-avatar" style="width:56px;height:56px;margin-bottom:24px;" src="https://i.postimg.cc/mDjmd9xJ/Perfil.png" alt="Luis José">
  <span class="notfound-code">ERROR 404</span>
  <h1>Esta página no existe.</h1>
  <p>El enlace que seguiste puede estar roto, o la página se movió de lugar. Vamos de vuelta a un sitio conocido.</p>
  <a class="btn-primary" href="/pagina/">Volver al inicio →</a>
</div>

</body>
</html>
